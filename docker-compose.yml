version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: phase2-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: practice
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
